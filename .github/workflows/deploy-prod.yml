name: CI/CD Deploy to AWS (prod)

# Deploys the application containers to the Phase 1 AWS EC2 host provisioned
# by infra-prod.yml. Runs on the self-hosted runner registered on that
# instance (label "aws-prod"; see infra/terraform/aws/templates/user_data.sh.tpl).
#
# `main` remains the development branch and keeps deploying to the existing
# VPS via .github/workflows/deploy.yml, unchanged. Merge/promote to `prod`
# to ship to AWS.

on:
  push:
    branches:
      - prod

jobs:
  build-and-deploy:
    runs-on: [self-hosted, aws-prod]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Ensure this self-hosted runner can talk to the host Docker daemon.
      # Every `docker build`/`docker compose` step below connects to
      # /var/run/docker.sock, which is owned root:docker (mode 660). If the
      # runner's user isn't effectively in the `docker` group the very first
      # build fails with "permission denied ... /var/run/docker.sock". This
      # commonly happens when the user was added to the group *after* the
      # runner service started (group changes don't apply to already-running
      # processes) — restarting the runner service isn't possible from within
      # its own job, so a plain `usermod`/ACL fix can't take effect until the
      # *next* job. Self-heal it best-effort so *this* deploy doesn't hard-fail.
      - name: Ensure Docker daemon access
        run: |
          if docker info >/dev/null 2>&1; then
            echo "Docker daemon reachable."
            exit 0
          fi
          echo "::warning::Docker socket not accessible by '$(id -un)'; attempting to self-heal."
          sock=/var/run/docker.sock
          # Persist group membership so future runner sessions work without this step.
          sudo usermod -aG docker "$(id -un)" || true
          # Grant the *current* session immediate access (a group change does not
          # apply to the already-running runner process) via an ACL on the socket.
          # Install the `acl` package on the fly if it's missing so this always
          # has a chance to work, falling back to fixing the socket's group/perms.
          if ! command -v setfacl >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update -y >/dev/null 2>&1 && sudo apt-get install -y acl >/dev/null 2>&1 || true
            elif command -v dnf >/dev/null 2>&1; then
              sudo dnf install -y acl >/dev/null 2>&1 || true
            elif command -v yum >/dev/null 2>&1; then
              sudo yum install -y acl >/dev/null 2>&1 || true
            fi
          fi
          if command -v setfacl >/dev/null 2>&1; then
            sudo setfacl -m "u:$(id -un):rw" "$sock" || true
          else
            sudo chgrp docker "$sock" 2>/dev/null || true
            sudo chmod g+rw "$sock" || true
          fi
          if docker info >/dev/null 2>&1; then
            echo "Docker access restored."
            exit 0
          fi
          # Group/ACL changes still don't apply to this already-running runner
          # process (its supplementary group list is fixed at process start).
          # As a last resort, wrap `docker` in a passwordless-sudo shim for the
          # rest of *this* job only, so the deploy can proceed without needing
          # a runner service restart mid-job.
          if sudo -n docker info >/dev/null 2>&1; then
            echo "::warning::Falling back to passwordless sudo for docker in this job; restart the runner service to fix this permanently."
            shim_dir="$(mktemp -d "${RUNNER_TEMP:-${TMPDIR:-/tmp}}/tmp.XXXXXXXXXX")"
            printf '%s\n' '#!/bin/sh' 'exec sudo -n docker "$@"' > "$shim_dir/docker"
            chmod +x "$shim_dir/docker"
            echo "$shim_dir" >> "$GITHUB_PATH"
            exit 0
          fi
          echo "::error::Unable to access the Docker daemon socket at $sock."
          echo "Add the self-hosted runner's user to the 'docker' group and restart the runner service:"
          echo "  sudo usermod -aG docker <runner-user> && sudo systemctl restart 'actions.runner.*'"
          exit 1

      # Build directly with `docker build` against the host Docker daemon so
      # images land in the local image store (the stack below runs them by
      # name). We intentionally do NOT use docker/setup-buildx-action here:
      # its `docker`-driver path fails on these self-hosted runners with
      # "Cannot read properties of undefined (reading 'endpoint')", and the
      # default `docker-container` driver spins up a privileged BuildKit
      # container that fails with "permission denied ... /var/run/docker.sock".
      # `docker build` uses the host's default builder and needs neither.

      - name: Build Backend Image
        run: docker build -t office-manager-backend:latest ./backend

      - name: Build Frontend Image
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=/api/v1 \
            --build-arg VITE_GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
            -t office-manager-frontend:latest \
            ./frontend

      - name: Build Admin Frontend Image
        run: docker build -t office-manager-admin-frontend:latest ./admin-frontend

      - name: Build Landing Image
        run: docker build -t office-manager-landing:latest ./landing

      # Fail fast if any required secret is missing — mirrors deploy.yml's
      # guard against unset GitHub secrets silently becoming empty strings.
      - name: Validate Required Secrets
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST: ${{ secrets.RDS_HOST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DEFAULT_ADMIN_PASSWORD: ${{ secrets.DEFAULT_ADMIN_PASSWORD }}
          S3_UPLOAD_BUCKET: ${{ secrets.S3_UPLOAD_BUCKET }}
        run: |
          missing=()
          for var in POSTGRES_PASSWORD POSTGRES_HOST JWT_SECRET DEFAULT_ADMIN_PASSWORD S3_UPLOAD_BUCKET; do
            if [ -z "${!var}" ]; then
              missing+=("$var")
            fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required repository secret(s): ${missing[*]}"
            echo "Set them under Settings > Secrets and variables > Actions > Repository secrets."
            exit 1
          fi
          echo "All required secrets are present."

      - name: Deploy Updated Stack
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST: ${{ secrets.RDS_HOST }}
          POSTGRES_PORT: ${{ secrets.RDS_PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          ADMIN_FRONTEND_URL: ${{ secrets.ADMIN_FRONTEND_URL }}
          DEFAULT_ADMIN_EMAIL: ${{ secrets.DEFAULT_ADMIN_EMAIL }}
          DEFAULT_ADMIN_PASSWORD: ${{ secrets.DEFAULT_ADMIN_PASSWORD }}
          APP_PORT: ${{ secrets.APP_PORT }}
          ADMIN_PORT: ${{ secrets.ADMIN_PORT }}
          LANDING_PORT: ${{ secrets.LANDING_PORT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          S3_UPLOAD_BUCKET: ${{ secrets.S3_UPLOAD_BUCKET }}
          S3_UPLOAD_PREFIX: ${{ secrets.S3_UPLOAD_PREFIX }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "Recreating application stack on AWS to pick up new image layers..."

          # Fully tear down the previous stack first. `up --force-recreate` alone
          # can race with the old containers' host-port bindings not yet being
          # released, causing "port is already allocated" failures. Bringing the
          # stack down first (and tolerating a missing/absent stack on first run)
          # reduces the window in which the ports are still held.
          docker compose -p prod-office-manager -f docker-compose.prod.yml down --remove-orphans --timeout 30 || true

          # `docker compose down` returning does NOT guarantee the Docker daemon
          # has finished releasing the old host-port bindings — the kernel/proxy
          # can hold them for a moment longer. When that happens, the immediately
          # following `up` fails with "port is already allocated". Retry a few
          # times so the transient race self-heals instead of failing the deploy.
          up() {
            docker compose -p prod-office-manager -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
          }
          attempt=1
          max_attempts=5
          until up; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::Stack failed to start after $max_attempts attempts (ports still held?)."
              docker ps -a
              exit 1
            fi
            echo "up attempt $attempt failed (likely port still releasing); retrying in 5s..."
            docker compose -p prod-office-manager -f docker-compose.prod.yml down --remove-orphans --timeout 30 || true
            attempt=$((attempt + 1))
            sleep 5
          done

          docker image prune -f
