name: AWS Infra + Deploy (prod)

# End-to-end prod pipeline for the `prod` branch. A single workflow that:
#
#   1. infra           — validates/updates the AWS footprint with Terraform.
#   2. build-and-push  — builds the four app images and pushes them to ECR.
#   3. deploy          — pulls the freshly pushed images and (re)starts the
#                        compose stack on the AWS EC2 host.
#
# Stages 1 and 2 run on the persistent on-prem "docker-build" self-hosted
# runner (labels: self-hosted, Linux, X64, docker-build). Running Terraform
# there — rather than on the EC2 box it manages — avoids the chicken-and-egg
# problem (that box *is* the instance this workflow creates), and because the
# runner is long-lived its Terraform plugin cache / working dir persist between
# runs. Terraform state itself is still stored remotely in the S3 bucket +
# DynamoDB lock table (see versions.tf / backend.hcl.example), so it survives
# even if the runner host is rebuilt.
#
# Stage 3 ALSO runs on the "docker-build" runner. It does not run on the EC2
# host — that box no longer registers a self-hosted runner. Instead the deploy
# is driven remotely with `aws ssm send-command`, so the pull/restart still
# happens on-box (keeping the low-powered host out of the build path) but there
# is no runner registration to lose when the instance is replaced by Terraform.
# The ECR repositories and every stage's IAM permissions are provisioned by
# infra/terraform/aws/ecr.tf and infra/terraform/bootstrap/github_oidc.tf.
#
# `main` remains the development branch and keeps deploying to the existing
# VPS via .github/workflows/deploy.yml, unchanged. Merge/promote to `prod`
# to ship to AWS.

on:
  push:
    branches:
      - prod
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - update
          - destroy

permissions:
  contents: read

env:
  # ECR repository namespace — must match infra/terraform/aws/ecr.tf
  # ("<project_name>/<image>"). project_name defaults to "office-manager".
  ECR_NAMESPACE: office-manager

jobs:
  # ── Stage 1: ensure the AWS infrastructure is in place ──────────────────────
  infra:
    runs-on: [self-hosted, Linux, X64, docker-build]
    permissions:
      contents: read
      id-token: write # required to mint the OIDC token assumed below
    defaults:
      run:
        working-directory: infra/terraform/aws
    env:
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
      TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET }}
      TF_VAR_default_admin_password: ${{ secrets.TF_VAR_DEFAULT_ADMIN_PASSWORD }}
      TF_VAR_stripe_secret_key: ${{ secrets.TF_VAR_STRIPE_SECRET_KEY }}
      TF_VAR_gemini_api_key: ${{ secrets.TF_VAR_GEMINI_API_KEY }}
      TF_VAR_sentry_dsn: ${{ secrets.TF_VAR_SENTRY_DSN }}
      # Folded into the Secrets Manager app secret so the SSM-driven deploy job
      # can assemble the container .env entirely on-box (all optional).
      TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      TF_VAR_smtp_user: ${{ secrets.SMTP_USER }}
      TF_VAR_smtp_password: ${{ secrets.SMTP_PASSWORD }}
      TF_VAR_npm_admin_password: ${{ secrets.NPM_ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Role-based access: assumes the `github_actions_infra` IAM role (see
      # infra/terraform/bootstrap/github_oidc.tf) via short-lived OIDC tokens
      # instead of long-lived AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY secrets.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-2' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Check Terraform state backend variables
        env:
          # These are documented as repository *variables* (Settings >
          # Secrets and variables > Actions > Variables), since bucket/table
          # names aren't sensitive. Some setups add them under the
          # *Secrets* tab instead — fall back to the same-named secret so
          # that case still works, rather than failing with a misleading
          # "missing" error when the value does in fact exist.
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || secrets.TF_STATE_BUCKET }}
          TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE || secrets.TF_STATE_LOCK_TABLE }}
        run: |
          missing=()
          [ -z "$TF_STATE_BUCKET" ] && missing+=("TF_STATE_BUCKET")
          [ -z "$TF_STATE_LOCK_TABLE" ] && missing+=("TF_STATE_LOCK_TABLE")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required repository variable(s): ${missing[*]}. Set them under Settings > Secrets and variables > Actions > Variables (preferred, since these values aren't sensitive) or Secrets, using the values from 'terraform output' in infra/terraform/bootstrap (see docs/aws-deployment.md). Terraform init cannot proceed with an empty S3 backend configuration."
            exit 1
          fi

      - name: Terraform Init
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || secrets.TF_STATE_BUCKET }}
          TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE || secrets.TF_STATE_LOCK_TABLE }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=aws/prod/terraform.tfstate" \
            -backend-config="region=${{ vars.TF_STATE_REGION || 'us-east-2' }}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}"

      - name: Terraform Validate
        run: terraform validate

      # Because Terraform state itself is remote (see above), this step is
      # normally a no-op. It only kicks in after AWS ends up with resources
      # Terraform's state doesn't know about — e.g. a previous run created
      # them but failed/was interrupted before its own state write landed, or
      # a partial `destroy` removed some resources from state (or scheduled
      # a secret for deletion) without deleting all of them from AWS. Left
      # unhandled, the next `apply` fails with "already exists"/"Duplicate"
      # errors trying to recreate resources AWS already has (see
      # docs/aws-deployment.md, "Recovering from already exists errors").
      # This makes that recovery automatic instead of a manual `terraform
      # import` chore for every occurrence.
      - name: Self-heal Terraform state (import pre-existing resources)
        if: github.event.inputs.action != 'destroy'
        run: |
          set -euo pipefail
          NAME="${{ env.ECR_NAMESPACE }}-prod"
          SECRET_NAME="${{ env.ECR_NAMESPACE }}/prod/app-secrets"
          failed=0

          state_has() { terraform state list "$1" >/dev/null 2>&1; }

          # Imports $2 into $1 if not already tracked, logging (but not
          # aborting the step on) failures so every resource still gets a
          # chance to self-heal even if one import fails.
          do_import() {
            local addr="$1" id="$2"
            echo "Importing pre-existing resource $addr ($id) into state..."
            if ! terraform import "$addr" "$id"; then
              echo "::warning::Failed to import $addr ($id); terraform plan/apply will likely fail on it."
              failed=1
            fi
          }

          # Looks up $3 once via "$4..." and imports $1/$2 if it exists in AWS
          # but isn't yet tracked in state.
          import_if_missing() {
            local addr="$1" id="$2"
            shift 2
            if state_has "$addr"; then
              return 0
            fi
            if "$@" >/dev/null 2>&1; then
              do_import "$addr" "$id"
            fi
          }

          import_if_missing "aws_iam_role.app" "$NAME-app" \
            aws iam get-role --role-name "$NAME-app"

          import_if_missing "aws_db_subnet_group.this" "$NAME" \
            aws rds describe-db-subnet-groups --db-subnet-group-name "$NAME"

          import_if_missing "aws_s3_bucket.uploads" "$NAME-uploads" \
            aws s3api head-bucket --bucket "$NAME-uploads"

          import_if_missing "aws_s3_bucket.backups" "$NAME-backups" \
            aws s3api head-bucket --bucket "$NAME-backups"

          # Security group ids aren't guessable from their name, so look them
          # up first instead of using the `import_if_missing` id shortcut.
          # Scope the lookup to the same VPC Terraform targets (network.tf's
          # data.aws_vpc.selected) since group names are only unique per VPC.
          vpc_id="${TF_VAR_vpc_id:-}"
          vpc_lookup_failed=0
          if [ -z "$vpc_id" ]; then
            # aws --output text prints the literal string "None" for a null
            # result (e.g. no default VPC); a describe-vpcs call failure
            # (e.g. permissions) is distinguished from that via its exit code
            # rather than being silently folded into the same fallback.
            if ! vpc_id="$(aws ec2 describe-vpcs --filters Name=is-default,Values=true \
                --query 'Vpcs[0].VpcId' --output text 2>/dev/null)"; then
              vpc_lookup_failed=1
              vpc_id=""
            fi
          fi
          if [ "$vpc_lookup_failed" -eq 1 ]; then
            echo "::warning::Could not look up the default VPC (describe-vpcs call failed); skipping security group auto-import."
            failed=1
          elif [ -z "$vpc_id" ] || [ "$vpc_id" = "None" ]; then
            echo "No default VPC found; skipping security group auto-import."
          fi
          for sg_key in app db; do
            addr="aws_security_group.$sg_key"
            sg_name="$NAME-$sg_key"
            if state_has "$addr" || [ -z "$vpc_id" ] || [ "$vpc_id" = "None" ]; then
              continue
            fi
            # Fetch the count and (potential) id in one call rather than two.
            if sg_lookup="$(aws ec2 describe-security-groups \
                --filters "Name=group-name,Values=$sg_name" "Name=vpc-id,Values=$vpc_id" \
                --query '[length(SecurityGroups), SecurityGroups[0].GroupId]' --output text 2>/dev/null)"; then
              read -r matches sg_id <<<"$sg_lookup"
            else
              echo "::warning::describe-security-groups failed for $sg_name; skipping auto-import."
              failed=1
              continue
            fi
            if [ "$matches" = "1" ]; then
              do_import "$addr" "$sg_id"
            elif [ "${matches:-0}" != "0" ]; then
              echo "::warning::Found $matches security groups named $sg_name in $vpc_id; skipping auto-import (ambiguous)."
              failed=1
            fi
          done

          # The secret may be left "scheduled for deletion" by a previous
          # (partial) destroy; it must be restored before it can be created
          # or imported.
          secret_is_deleted() {
            local deleted_date
            deleted_date="$(aws secretsmanager describe-secret --secret-id "$1" \
              --query 'DeletedDate' --output text 2>/dev/null || true)"
            [ -n "$deleted_date" ] && [ "$deleted_date" != "None" ]
          }
          if ! state_has "aws_secretsmanager_secret.app"; then
            restore_failed=0
            if secret_is_deleted "$SECRET_NAME"; then
              echo "Restoring $SECRET_NAME from scheduled deletion..."
              if ! restore_err="$(aws secretsmanager restore-secret --secret-id "$SECRET_NAME" 2>&1)"; then
                # Flatten to one line so it can't break the ::warning:: annotation.
                restore_err_flat="$(echo "$restore_err" | tr '\n' ' ')"
                echo "::warning::Failed to restore $SECRET_NAME from scheduled deletion: $restore_err_flat"
                restore_failed=1
                failed=1
              fi
            fi
            # restore-secret is not guaranteed to be immediately consistent,
            # so re-check DeletedDate is actually gone before importing
            # (unless the restore call itself already failed and warned above).
            if secret_is_deleted "$SECRET_NAME"; then
              if [ "$restore_failed" -eq 0 ]; then
                echo "::warning::$SECRET_NAME is still scheduled for deletion after restore attempt; skipping import."
                failed=1
              fi
            elif aws secretsmanager describe-secret --secret-id "$SECRET_NAME" >/dev/null 2>&1; then
              do_import "aws_secretsmanager_secret.app" "$SECRET_NAME"
            fi
          fi

          # Don't fail the job here: a failed import just means the next
          # `terraform plan`/`apply` step surfaces the underlying AWS error
          # directly, which is more actionable than failing this step.
          if [ "$failed" -ne 0 ]; then
            echo "::warning::One or more pre-existing resources could not be auto-imported; see warnings above."
          fi

      - name: Terraform Plan
        if: github.event.inputs.action != 'destroy'
        run: terraform plan -out=tfplan

      # Applies the plan above. This covers both provisioning brand-new
      # resources and updating any resources whose configuration has
      # changed (Terraform's plan/apply is inherently create-or-update).
      # Runs on push (every prod ship) and on the apply/update dispatch inputs.
      - name: Terraform Apply
        if: github.event_name == 'push' || github.event.inputs.action == 'apply' || github.event.inputs.action == 'update'
        run: terraform apply -auto-approve tfplan

      # Tears down the entire managed footprint so it can be rebuilt from
      # scratch. Only runs when explicitly requested via workflow_dispatch.
      - name: Terraform Plan Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform plan -destroy -out=tfplan-destroy

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform apply -auto-approve tfplan-destroy

  # ── Stage 2: build the images and push them to ECR ──────────────────────────
  build-and-push:
    needs: infra
    if: github.event_name == 'push' || github.event.inputs.action == 'apply' || github.event.inputs.action == 'update'
    runs-on: [self-hosted, Linux, X64, docker-build]
    permissions:
      contents: read
      id-token: write # required to mint the OIDC token assumed below
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Role-based access: assumes the `github_actions_ecr_push` IAM role (see
      # infra/terraform/bootstrap/github_oidc.tf) via short-lived OIDC tokens
      # instead of long-lived AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY secrets.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-2' }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Ensure the four ECR repositories exist. Terraform (the `infra` job)
      # normally creates them, but this guard keeps the deploy resilient even
      # if a repo was removed out-of-band, and is a no-op otherwise.
      - name: Ensure ECR repositories exist
        run: |
          for image in backend frontend admin-frontend landing; do
            repo="${ECR_NAMESPACE}/${image}"
            if ! aws ecr describe-repositories --repository-names "$repo" >/dev/null 2>&1; then
              echo "Creating ECR repository $repo"
              aws ecr create-repository \
                --repository-name "$repo" \
                --image-scanning-configuration scanOnPush=true >/dev/null
            fi
          done

      - name: Compute image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      # This runner is amd64 (`X64`), but the prod EC2 deploy host is arm64
      # (Graviton / al2023-arm64 — see infra/terraform/aws/network.tf). Register
      # QEMU/binfmt handlers so buildx can cross-build the arm64 images the
      # deploy host pulls; without this every image is amd64-only and the
      # `deploy` job's `docker compose pull` fails with
      # "no matching manifest for linux/arm64/v8 in the manifest list entries".
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Use the `docker` driver so builds run against the host Docker
          # daemon. The default `docker-container` driver spins up a privileged
          # BuildKit container, which fails on these self-hosted runners with
          # "permission denied ... /var/run/docker.sock". The `docker` driver
          # (with the QEMU step above) still cross-builds a single foreign
          # platform such as linux/arm64.
          driver: docker

      # `platforms: linux/arm64` targets the prod EC2 deploy host's architecture
      # rather than this amd64 build runner's, so the pushed image manifest
      # matches what `deploy` pulls.
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          platforms: linux/arm64
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_NAMESPACE }}/backend:${{ steps.meta.outputs.image_tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_NAMESPACE }}/backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          platforms: linux/arm64
          build-args: |
            VITE_API_BASE_URL=/api/v1
            VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_NAMESPACE }}/frontend:${{ steps.meta.outputs.image_tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_NAMESPACE }}/frontend:latest

      - name: Build and Push Admin Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./admin-frontend
          push: true
          platforms: linux/arm64
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_NAMESPACE }}/admin-frontend:${{ steps.meta.outputs.image_tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_NAMESPACE }}/admin-frontend:latest

      - name: Build and Push Landing Image
        uses: docker/build-push-action@v5
        with:
          context: ./landing
          push: true
          platforms: linux/arm64
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_NAMESPACE }}/landing:${{ steps.meta.outputs.image_tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_NAMESPACE }}/landing:latest

  # ── Stage 3: pull the pushed images and (re)start the stack on AWS ──────────
  # Runs on the on-prem `docker-build` runner (NOT on the EC2 host — the box no
  # longer registers a self-hosted runner). It drives the container pull/restart
  # remotely with a single `aws ssm send-command`, so a rebuilt/replaced
  # instance needs zero manual bootstrap: as long as Terraform has recreated it
  # (with the SSM agent + Docker from user_data), the very next deploy works.
  deploy:
    needs: build-and-push
    if: github.event_name == 'push' || github.event.inputs.action == 'apply' || github.event.inputs.action == 'update'
    runs-on: [self-hosted, Linux, X64, docker-build]
    permissions:
      contents: read
      id-token: write # required to mint the OIDC token assumed below

    steps:
      # Assume the `github_actions_deploy` role (see infra/terraform/bootstrap/
      # github_oidc.tf): least-privilege, only `ssm:SendCommand` at the app
      # instance plus poll/describe. All the heavy lifting (ECR pull, Secrets
      # Manager read, S3) happens on-box under the *instance* profile.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-2' }}

      # Resolve the target instance by its Terraform-managed Name tag so we
      # never hard-code an instance id that changes when the box is replaced.
      - name: Resolve app instance id
        id: ec2
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-2' }}
        run: |
          set -euo pipefail
          iid="$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${ECR_NAMESPACE}-prod-app" \
                      "Name=instance-state-name,Values=running,pending" \
            --query 'Reservations[].Instances[].InstanceId | [0]' \
            --output text)"
          if [ -z "$iid" ] || [ "$iid" = "None" ]; then
            echo "::error::No running EC2 instance tagged Name=${ECR_NAMESPACE}-prod-app found. Has the 'infra' job created it?"
            exit 1
          fi
          echo "Resolved app instance: $iid"
          echo "instance_id=$iid" >> "$GITHUB_OUTPUT"

      # Everything the container stack needs is either a *secret* (fetched
      # on-box from Secrets Manager) or *non-secret config* (assembled here and
      # shipped base64-encoded so it neither trips GitHub's log masking nor
      # leaks real secrets into CloudTrail / SSM command history).
      - name: Deploy via SSM
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-2' }}
          INSTANCE_ID: ${{ steps.ec2.outputs.instance_id }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          # Non-secret container config (defaults live in docker-compose.prod.yml).
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_HOST: ${{ secrets.RDS_HOST }}
          POSTGRES_PORT: ${{ secrets.RDS_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SUPPORT_EMAIL: ${{ secrets.SUPPORT_EMAIL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          ADMIN_FRONTEND_URL: ${{ secrets.ADMIN_FRONTEND_URL }}
          DEFAULT_ADMIN_EMAIL: ${{ secrets.DEFAULT_ADMIN_EMAIL }}
          SUPER_ADMIN_EMAILS: ${{ secrets.SUPER_ADMIN_EMAILS }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          S3_UPLOAD_BUCKET: ${{ secrets.S3_UPLOAD_BUCKET }}
          S3_UPLOAD_PREFIX: ${{ secrets.S3_UPLOAD_PREFIX }}
          APP_PORT: ${{ secrets.APP_PORT }}
          ADMIN_PORT: ${{ secrets.ADMIN_PORT }}
          LANDING_PORT: ${{ secrets.LANDING_PORT }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          NPM_IMAGE_TAG: ${{ secrets.NPM_IMAGE_TAG }}
          NPM_ADMIN_EMAIL: ${{ secrets.NPM_ADMIN_EMAIL }}
          NPM_LETSENCRYPT_EMAIL: ${{ secrets.NPM_LETSENCRYPT_EMAIL }}
          NPM_FRONTEND_DOMAIN: ${{ secrets.NPM_FRONTEND_DOMAIN }}
          NPM_ADMIN_DOMAIN: ${{ secrets.NPM_ADMIN_DOMAIN }}
          NPM_LANDING_DOMAIN: ${{ secrets.NPM_LANDING_DOMAIN }}
          NPM_API_DOMAIN: ${{ secrets.NPM_API_DOMAIN }}
        run: |
          set -euo pipefail

          # Fail fast on the handful of values the compose stack marks required
          # (docker-compose.prod.yml `${VAR:?...}`) but that come from CI config
          # rather than Secrets Manager. The secret-sourced ones are validated
          # on-box after the Secrets Manager fetch.
          missing=()
          for var in IMAGE_TAG POSTGRES_HOST S3_UPLOAD_BUCKET; do
            [ -z "${!var:-}" ] && missing+=("$var")
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required value(s): ${missing[*]}. IMAGE_TAG comes from 'build-and-push'; the rest are repository secrets (RDS_HOST, S3_UPLOAD_BUCKET)."
            exit 1
          fi

          # ── Assemble non-secret .env config ─────────────────────────────────
          # Only keys with a value are emitted; docker-compose.prod.yml supplies
          # sane defaults for anything omitted. Secrets are deliberately NOT
          # included here — the on-box script fetches those from Secrets Manager.
          conf="$(mktemp)"
          emit() { [ -n "${2:-}" ] && printf '%s=%s\n' "$1" "$2" >> "$conf" || true; }
          emit ECR_NAMESPACE   "$ECR_NAMESPACE"
          emit IMAGE_TAG       "$IMAGE_TAG"
          emit AWS_REGION      "$AWS_REGION"
          emit POSTGRES_USER   "$POSTGRES_USER"
          emit POSTGRES_HOST   "$POSTGRES_HOST"
          emit POSTGRES_PORT   "$POSTGRES_PORT"
          emit POSTGRES_DB     "$POSTGRES_DB"
          emit GOOGLE_CLIENT_ID "$GOOGLE_CLIENT_ID"
          emit SMTP_HOST       "$SMTP_HOST"
          emit SMTP_PORT       "$SMTP_PORT"
          emit SMTP_FROM       "$SMTP_FROM"
          emit SUPPORT_EMAIL   "$SUPPORT_EMAIL"
          emit FRONTEND_URL    "$FRONTEND_URL"
          emit ADMIN_FRONTEND_URL "$ADMIN_FRONTEND_URL"
          emit DEFAULT_ADMIN_EMAIL "$DEFAULT_ADMIN_EMAIL"
          emit SUPER_ADMIN_EMAILS  "$SUPER_ADMIN_EMAILS"
          emit GEMINI_MODEL    "$GEMINI_MODEL"
          emit S3_UPLOAD_BUCKET "$S3_UPLOAD_BUCKET"
          emit S3_UPLOAD_PREFIX "$S3_UPLOAD_PREFIX"
          emit APP_PORT        "$APP_PORT"
          emit ADMIN_PORT      "$ADMIN_PORT"
          emit LANDING_PORT    "$LANDING_PORT"
          emit BACKEND_PORT    "$BACKEND_PORT"
          emit NPM_IMAGE_TAG   "$NPM_IMAGE_TAG"
          emit NPM_ADMIN_EMAIL "$NPM_ADMIN_EMAIL"
          emit NPM_LETSENCRYPT_EMAIL "$NPM_LETSENCRYPT_EMAIL"
          emit NPM_FRONTEND_DOMAIN "$NPM_FRONTEND_DOMAIN"
          emit NPM_ADMIN_DOMAIN "$NPM_ADMIN_DOMAIN"
          emit NPM_LANDING_DOMAIN "$NPM_LANDING_DOMAIN"
          emit NPM_API_DOMAIN  "$NPM_API_DOMAIN"
          config_b64="$(base64 -w0 "$conf")"
          rm -f "$conf"

          # ── Build the remote script ─────────────────────────────────────────
          # A short dynamic header injects the (non-secret) job-side values;
          # the static body is a quoted heredoc so nothing else is expanded here.
          remote="$(mktemp)"
          {
            echo "#!/bin/bash"
            echo "CONFIG_B64='${config_b64}'"
            echo "REPO='${GITHUB_REPOSITORY}'"
            echo "SHA='${IMAGE_TAG}'"
            echo "SECRET_NAME='${ECR_NAMESPACE}/prod/app-secrets'"
            echo "REGION='${AWS_REGION}'"
            cat <<'REMOTE'
          set -euo pipefail
          REPO_DIR=/home/ec2-user/office-manager
          PROJECT=prod-office-manager
          COMPOSE=(docker compose -p "$PROJECT" -f docker-compose.prod.yml)

          # Warm-cache clone may be missing if the box was just rebuilt.
          if [ ! -d "$REPO_DIR/.git" ]; then
            git clone "https://github.com/$REPO.git" "$REPO_DIR"
          fi
          cd "$REPO_DIR"
          git fetch --all --prune --quiet
          # Deploy the exact commit that produced the images being pulled.
          git checkout -f "$SHA"

          # ── Assemble the container .env ────────────────────────────────────
          umask 077
          env_file="$REPO_DIR/.env"
          echo "$CONFIG_B64" | base64 -d > "$env_file"

          secret_json="$(aws secretsmanager get-secret-value \
            --secret-id "$SECRET_NAME" --region "$REGION" \
            --query SecretString --output text)"
          for k in POSTGRES_PASSWORD JWT_SECRET DEFAULT_ADMIN_PASSWORD \
                   STRIPE_SECRET_KEY GEMINI_API_KEY SENTRY_DSN \
                   GOOGLE_CLIENT_SECRET SMTP_USER SMTP_PASSWORD NPM_ADMIN_PASSWORD; do
            v="$(printf '%s' "$secret_json" | jq -r --arg k "$k" '.[$k] // empty')"
            [ -n "$v" ] && printf '%s=%s\n' "$k" "$v" >> "$env_file"
          done

          # Required-by-compose secret sanity check.
          for req in POSTGRES_PASSWORD JWT_SECRET DEFAULT_ADMIN_PASSWORD; do
            grep -q "^${req}=" "$env_file" || { echo "Missing $req in Secrets Manager secret $SECRET_NAME" >&2; exit 1; }
          done

          # ── ECR login (instance profile grants pull) ───────────────────────
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          ecr_registry="${account_id}.dkr.ecr.${REGION}.amazonaws.com"
          echo "ECR_REGISTRY=${ecr_registry}" >> "$env_file"
          aws ecr get-login-password --region "$REGION" \
            | docker login --username AWS --password-stdin "$ecr_registry"

          # ── Pull + recreate the stack ──────────────────────────────────────
          echo "Pulling ${ecr_registry}/* images tagged ${SHA}..."
          "${COMPOSE[@]}" pull

          # Tear the old stack down first so host-port bindings are released
          # before `up` rebinds them (avoids "port is already allocated").
          "${COMPOSE[@]}" down --remove-orphans --timeout 30 || true

          attempt=1
          max_attempts=5
          until "${COMPOSE[@]}" up -d --force-recreate --remove-orphans; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Stack failed to start after $max_attempts attempts (ports still held?)." >&2
              docker ps -a
              exit 1
            fi
            echo "up attempt $attempt failed (likely port still releasing); retrying in 5s..."
            "${COMPOSE[@]}" down --remove-orphans --timeout 30 || true
            attempt=$((attempt + 1))
            sleep 5
          done

          docker image prune -f

          # ── Provision NPM routes (idempotent; no-op without domains) ────────
          set -a
          # shellcheck disable=SC1090
          . "$env_file"
          set +a
          export NPM_BASE_URL="http://localhost:81"
          if [ -n "${NPM_FRONTEND_DOMAIN:-}${NPM_ADMIN_DOMAIN:-}${NPM_LANDING_DOMAIN:-}${NPM_API_DOMAIN:-}" ]; then
            python3 infra/nginx-proxy-manager/bootstrap.py
          else
            echo "No NPM_*_DOMAIN set; skipping proxy-host configuration."
          fi

          echo "DEPLOY_OK"
          REMOTE
          } > "$remote"

          # ── Send the command and stream the result ─────────────────────────
          params="$(mktemp)"
          jq -Rs '{commands: [.]}' "$remote" > "$params"
          rm -f "$remote"

          cmd_id="$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "prod deploy ${IMAGE_TAG}" \
            --parameters "file://${params}" \
            --region "$AWS_REGION" \
            --query 'Command.CommandId' --output text)"
          rm -f "$params"
          echo "SSM command: $cmd_id (instance $INSTANCE_ID)"

          # Poll until the invocation reaches a terminal state.
          status="Pending"
          for _ in $(seq 1 120); do
            sleep 15
            status="$(aws ssm get-command-invocation \
              --command-id "$cmd_id" --instance-id "$INSTANCE_ID" \
              --region "$AWS_REGION" --query 'Status' --output text 2>/dev/null || echo Pending)"
            echo "status: $status"
            case "$status" in
              Success|Failed|Cancelled|TimedOut|Undeliverable|Terminated) break ;;
            esac
          done

          echo "----- remote stdout -----"
          aws ssm get-command-invocation --command-id "$cmd_id" --instance-id "$INSTANCE_ID" \
            --region "$AWS_REGION" --query 'StandardOutputContent' --output text || true
          echo "----- remote stderr -----"
          aws ssm get-command-invocation --command-id "$cmd_id" --instance-id "$INSTANCE_ID" \
            --region "$AWS_REGION" --query 'StandardErrorContent' --output text || true

          if [ "$status" != "Success" ]; then
            echo "::error::Remote deploy command finished with status '$status'."
            exit 1
          fi
          echo "Remote deploy succeeded."

