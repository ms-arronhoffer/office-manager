name: AWS Infra (Terraform) - prod

# Provisions/updates the Phase 1 AWS footprint (EC2 app host, RDS Postgres,
# S3 buckets, IAM, Secrets Manager) described in docs/aws-deployment.md.
#
# Runs on a GitHub-hosted runner (not the self-hosted "aws-prod" runner)
# because the self-hosted runner *is* the EC2 instance this workflow
# creates/updates — a chicken-and-egg problem the app deploy workflow
# (deploy-prod.yml) doesn't have once the instance exists.

on:
  push:
    branches:
      - prod
    paths:
      - "infra/terraform/aws/**"
      - ".github/workflows/infra-prod.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform/aws
    env:
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
      TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET }}
      TF_VAR_default_admin_password: ${{ secrets.TF_VAR_DEFAULT_ADMIN_PASSWORD }}
      TF_VAR_stripe_secret_key: ${{ secrets.TF_VAR_STRIPE_SECRET_KEY }}
      TF_VAR_gemini_api_key: ${{ secrets.TF_VAR_GEMINI_API_KEY }}
      TF_VAR_sentry_dsn: ${{ secrets.TF_VAR_SENTRY_DSN }}
      TF_VAR_github_runner_pat: ${{ secrets.RUNNER_REGISTRATION_PAT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=aws/prod/terraform.tfstate" \
            -backend-config="region=${{ vars.TF_STATE_REGION || 'us-east-2' }}" \
            -backend-config="dynamodb_table=${{ vars.TF_STATE_LOCK_TABLE }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.event_name == 'push' || github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan
