name: CI/CD Deploy to Portainer

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. Build backend
      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          tags: office-manager-backend:latest
          push: false
          load: true

      # 2. Build frontend
      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          tags: office-manager-frontend:latest
          push: false
          load: true
          build-args: |
            VITE_API_BASE_URL=/api/v1
            VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}

      # 3. Build Admin Frontend
      - name: Build Admin Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./admin-frontend
          tags: office-manager-admin-frontend:latest
          push: false
          load: true

      # 4. Build Landing
      - name: Build Landing Image
        uses: docker/build-push-action@v5
        with:
          context: ./landing
          tags: office-manager-landing:latest
          push: false
          load: true

      # 5. Hot-swap the containers directly via Docker without needing the compose env variables
      - name: Force Local Container Update
        run: |
          # Use standard docker stop/rm/run syntax to recreate just the app containers.
          # Because Portainer created them originally, we can use 'docker animate' or a standard bounce:
          
          echo "Bouncing application containers to pick up new image layers..."
          
          # Stop and remove the old instances safely
          docker rm -f dev-office-manager-backend-1 || true
          docker rm -f dev-office-manager-frontend-1 || true
          docker rm -f dev-office-manager-admin-frontend-1 || true
          docker rm -f dev-office-manager-landing-1 || true

          # If you prefer to let Portainer keep tracking them cleanly without breaking its tracking ID, 
          # you can also execute a container restart if the daemon layer mapping updates automatically:
          # docker restart dev-office-manager-backend-1 dev-office-manager-frontend-1 dev-office-manager-admin-frontend-1 dev-office-manager-landing-1

          # Alternatively, the absolute cleanest way to force Portainer CE to pick it up without breaking the environment definitions:
          # We call Portainer's stack update mechanism or bypass the validation checks.
          
          # Let's clean up older dangling image layers to save space
          docker image prune -f
