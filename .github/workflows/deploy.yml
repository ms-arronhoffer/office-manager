name: CI/CD Deploy to Portainer

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted  # Runs on your local ubuntu-server-2 runner

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. Build the updated image layers into the local Docker daemon
      - name: Build Local Docker Images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: office-manager:latest # Match the image tag used in your compose file
          push: false                 # Keep it local on the daemon
          load: true                  # Loads it directly into the local host cache

      # 2. Notify Portainer to safely redeploy the stack using its UI-defined env vars
      - name: Trigger Portainer Webhook
        run: |
          curl -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
