name: CI/CD Deploy to Portainer

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Use the daemon's built-in builder instead of the default
          # docker-container driver. The container driver spins up a
          # buildx_buildkit_* helper container, which on this self-hosted
          # runner fails with "permission denied ... /var/run/docker.sock".
          # All images here are built locally (push: false, load: true), so
          # the docker driver is sufficient and loads straight into the daemon.
          driver: docker

      # 1. Build backend
      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          tags: office-manager-backend:latest
          push: false
          load: true

      # 2. Build frontend
      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          tags: office-manager-frontend:latest
          push: false
          load: true
          build-args: |
            VITE_API_BASE_URL=/api/v1
            VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}

      # 3. Build Admin Frontend
      - name: Build Admin Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./admin-frontend
          tags: office-manager-admin-frontend:latest
          push: false
          load: true

      # 4. Build Landing
      - name: Build Landing Image
        uses: docker/build-push-action@v5
        with:
          context: ./landing
          tags: office-manager-landing:latest
          push: false
          load: true

      # 5. Fail fast if any required secret is missing or empty. These map to the
      #    compose `${VAR:?...}` required variables; an unset GitHub secret is
      #    silently substituted with an empty string, which otherwise surfaces as
      #    a cryptic "required variable ... is missing a value" interpolation error.
      - name: Validate Required Secrets
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DEFAULT_ADMIN_PASSWORD: ${{ secrets.DEFAULT_ADMIN_PASSWORD }}
        run: |
          missing=()
          for var in POSTGRES_PASSWORD JWT_SECRET DEFAULT_ADMIN_PASSWORD; do
            if [ -z "${!var}" ]; then
              missing+=("$var")
            fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required repository secret(s): ${missing[*]}"
            echo "Set them under Settings > Secrets and variables > Actions > Repository secrets."
            echo "Names are case-sensitive and must match exactly."
            exit 1
          fi
          echo "All required secrets are present."

      # 6. Recreate the whole stack so every service picks up its new image
      - name: Deploy Updated Stack
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          ADMIN_FRONTEND_URL: ${{ secrets.ADMIN_FRONTEND_URL }}
          DEFAULT_ADMIN_EMAIL: ${{ secrets.DEFAULT_ADMIN_EMAIL }}
          DEFAULT_ADMIN_PASSWORD: ${{ secrets.DEFAULT_ADMIN_PASSWORD }}
          APP_PORT: ${{ secrets.APP_PORT }}
          ADMIN_PORT: ${{ secrets.ADMIN_PORT }}
          LANDING_PORT: ${{ secrets.LANDING_PORT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}	
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        run: |
          # Recreate every service (backend, frontend, admin-frontend, landing, db)
          # using the freshly built :latest images. Using the same compose project
          # name keeps the existing container names, networks and volumes intact so
          # Portainer continues to track the stack.
          echo "Recreating application stack to pick up new image layers..."

          # Tear the stack down first so old containers fully release their
          # published host ports before the new ones try to bind them.
          # `up --force-recreate` alone can race: it starts creating the new
          # containers while the old ones are still finishing removal, which
          # intermittently fails with "port is already allocated".
          docker compose -p dev-office-manager -f docker-compose.yml down --remove-orphans || true

          docker compose -p dev-office-manager -f docker-compose.yml up -d --force-recreate --remove-orphans

          # Clean up older dangling image layers to save space
          docker image prune -f
