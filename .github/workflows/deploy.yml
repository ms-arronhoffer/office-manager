name: CI/CD Deploy to Portainer

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. Build backend
      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          tags: office-manager-backend:latest
          push: false
          load: true

      # 2. Build frontend
      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          tags: office-manager-frontend:latest
          push: false
          load: true
          build-args: |
            VITE_API_BASE_URL=/api/v1
            VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}

      # 3. Build Admin Frontend
      - name: Build Admin Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./admin-frontend
          tags: office-manager-admin-frontend:latest
          push: false
          load: true

      # 4. Build Landing
      - name: Build Landing Image
        uses: docker/build-push-action@v5
        with:
          context: ./landing
          tags: office-manager-landing:latest
          push: false
          load: true

      # 5. Recreate the whole stack so every service picks up its new image
      - name: Deploy Updated Stack
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          ADMIN_FRONTEND_URL: ${{ secrets.ADMIN_FRONTEND_URL }}
          DEFAULT_ADMIN_EMAIL: ${{ secrets.DEFAULT_ADMIN_EMAIL }}
          DEFAULT_ADMIN_PASSWORD: ${{ secrets.DEFAULT_ADMIN_PASSWORD }}
          APP_PORT: ${{ secrets.APP_PORT }}
          ADMIN_PORT: ${{ secrets.ADMIN_PORT }}
          LANDING_PORT: ${{ secrets.LANDING_PORT }}
        run: |
          # Recreate every service (backend, frontend, admin-frontend, landing, db)
          # using the freshly built :latest images. Using the same compose project
          # name keeps the existing container names, networks and volumes intact so
          # Portainer continues to track the stack.
          echo "Recreating application stack to pick up new image layers..."

          docker compose -p dev-office-manager -f docker-compose.yml up -d --force-recreate --remove-orphans

          # Clean up older dangling image layers to save space
          docker image prune -f
