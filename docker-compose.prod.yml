services:
  backend:
    # Image is built by the `docker-build` runner and pushed to ECR; the
    # aws-prod runner pulls this exact tag. ECR_REGISTRY/ECR_NAMESPACE/IMAGE_TAG
    # are exported by .github/workflows/infra-prod.yml. Defaults keep local
    # `docker compose -f docker-compose.prod.yml` usage working against a
    # locally-built image tagged office-manager/backend:latest.
    image: ${ECR_REGISTRY:+${ECR_REGISTRY}/}${ECR_NAMESPACE:-office-manager}/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      # No local `db` container in this compose file: Postgres runs on RDS
      # (see infra/terraform/aws/rds.tf). POSTGRES_HOST/PORT point at the
      # Terraform-managed instance endpoint.
      POSTGRES_USER: ${POSTGRES_USER:-office_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_HOST: ${POSTGRES_HOST:?POSTGRES_HOST is required (RDS endpoint)}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-office_manager}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@officemanager.local}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4000}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@officemanager.local}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:?DEFAULT_ADMIN_PASSWORD is required}
      SUPER_ADMIN_EMAILS: ${SUPER_ADMIN_EMAILS:-}
      ADMIN_FRONTEND_URL: ${ADMIN_FRONTEND_URL:-http://localhost:4001}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      # Uploaded files live in S3 instead of a local Docker volume so the
      # backend container can be replaced/redeployed (or scaled to more than
      # one instance in Phase 2) without losing attachments.
      STORAGE_BACKEND: s3
      S3_UPLOAD_BUCKET: ${S3_UPLOAD_BUCKET:?S3_UPLOAD_BUCKET is required}
      S3_UPLOAD_PREFIX: ${S3_UPLOAD_PREFIX:-uploads}
      AWS_REGION: ${AWS_REGION:-us-east-2}

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/readyz').status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    # Published on 127.0.0.1 only, for host-level debugging (e.g. curl from an
    # SSH session). The bundled ``nginx-proxy-manager`` service does NOT use this
    # host port — it reaches the API as ``http://backend:8000`` over the shared
    # ``edge`` network below, so the container stays off the instance's
    # public/LAN interfaces. Never bound to 80/443 — those stay free for NPM.
    ports:
      - "127.0.0.1:${BACKEND_PORT:-4002}:8000"
    networks:
      - internal
      - edge

  frontend:
    image: ${ECR_REGISTRY:+${ECR_REGISTRY}/}${ECR_NAMESPACE:-office-manager}/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    # Reverse proxy (Nginx Proxy Manager) terminates TLS on 443/81 and forwards
    # to these host ports. Nothing here binds port 80. Bound to 127.0.0.1 so the
    # container is reachable only from the host (where NPM runs), never directly
    # from the public/LAN network.
    ports:
      - "127.0.0.1:${APP_PORT:-4001}:80"
    networks:
      - internal
      - edge

  admin-frontend:
    image: ${ECR_REGISTRY:+${ECR_REGISTRY}/}${ECR_NAMESPACE:-office-manager}/admin-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${ADMIN_PORT:-4004}:80"
    networks:
      - internal
      - edge

  landing:
    image: ${ECR_REGISTRY:+${ECR_REGISTRY}/}${ECR_NAMESPACE:-office-manager}/landing:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LANDING_PORT:-4003}:80"
    networks:
      - internal
      - edge

  # Nginx Proxy Manager is the single public ingress for the whole stack. It is
  # the only service that binds the host's public interface (80/443 for HTTP(S)
  # traffic, 81 for its admin UI). It reaches every app container by service
  # name over the shared ``edge`` network, so nothing else needs to be exposed
  # beyond 127.0.0.1. Port 81 (admin UI) is additionally firewalled at the AWS
  # security-group level to the trusted office CIDR (see infra/terraform/aws).
  #
  # Proxy hosts (routes), SSL certificates and the per-host "Block Common
  # Exploits", "Websockets Support" and "Force SSL" toggles are provisioned
  # idempotently by infra/nginx-proxy-manager/bootstrap.py after the container
  # is healthy — see that directory's README and docs/aws-deployment.md.
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:${NPM_IMAGE_TAG:-2.15.1}
    restart: unless-stopped
    depends_on:
      - frontend
      - admin-frontend
      - landing
      - backend
    ports:
      - "80:80"     # public HTTP (redirected to HTTPS by Force SSL)
      - "443:443"   # public HTTPS
      - "81:81"     # admin UI — locked down to the office CIDR in the SG
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - edge

networks:
  internal:
    driver: bridge
  # Shared ingress network. The bundled ``nginx-proxy-manager`` service (defined
  # above, in this same compose project) attaches here and reaches every app
  # container by service name/internal port — ``http://frontend:80``,
  # ``http://backend:8000``, ``http://admin-frontend:80``, ``http://landing:80``
  # — so no service needs to be published on the host's public/LAN interface and
  # no manual ``docker network connect`` wiring is required.
  edge:
    driver: bridge

volumes:
  # Nginx Proxy Manager configuration DB (proxy hosts, users, settings) and the
  # issued Let's Encrypt certificates. Persisted so routes/certs survive
  # container recreation on redeploy.
  npm_data:
  npm_letsencrypt:
