services:
  backend:
    image: office-manager-backend:latest   # Changed from build: ./backend
    restart: unless-stopped
    environment:
      # No local `db` container in this compose file: Postgres runs on RDS
      # (see infra/terraform/aws/rds.tf). POSTGRES_HOST/PORT point at the
      # Terraform-managed instance endpoint.
      POSTGRES_USER: ${POSTGRES_USER:-office_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_HOST: ${POSTGRES_HOST:?POSTGRES_HOST is required (RDS endpoint)}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-office_manager}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@officemanager.local}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4000}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@officemanager.local}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:?DEFAULT_ADMIN_PASSWORD is required}
      SUPER_ADMIN_EMAILS: ${SUPER_ADMIN_EMAILS:-}
      ADMIN_FRONTEND_URL: ${ADMIN_FRONTEND_URL:-http://localhost:4001}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      # Uploaded files live in S3 instead of a local Docker volume so the
      # backend container can be replaced/redeployed (or scaled to more than
      # one instance in Phase 2) without losing attachments.
      STORAGE_BACKEND: s3
      S3_UPLOAD_BUCKET: ${S3_UPLOAD_BUCKET:?S3_UPLOAD_BUCKET is required}
      S3_UPLOAD_PREFIX: ${S3_UPLOAD_PREFIX:-uploads}
      AWS_REGION: ${AWS_REGION:-us-east-2}

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/readyz').status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - internal

  frontend:
    image: office-manager-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"
    networks:
      - internal

  admin-frontend:
    image: office-manager-admin-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${ADMIN_PORT:-4001}:80"
    networks:
      - internal

  landing:
    image: office-manager-landing:latest
    restart: unless-stopped
    ports:
      - "${LANDING_PORT:-4002}:80"
    networks:
      - internal

networks:
  internal:
    driver: bridge
