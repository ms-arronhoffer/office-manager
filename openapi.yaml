        '400': { $ref: '#/components/responses/BadRequest' }

  # -------------------------------------------------------------------------
  # Reusable response bodies & parameters
  # -------------------------------------------------------------------------
  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorDetail' }
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorDetail' }
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorDetail' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorDetail' }
    Conflict:
      description: Conflict (duplicate resource)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorDetail' }
    RateLimited:
      description: Rate limit exceeded (200 req/min)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorDetail' }

  parameters:
    Page:
      name: page
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
    PageSize:
      name: page_size
      in: query
      schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
    OfficeId:
      name: office_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    LeaseId:
      name: lease_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    TicketId:
      name: ticket_id
      in: path
      required: true
      schema: { type: string, format: uuid }
