services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-office_manager}
      POSTGRES_USER: ${POSTGRES_USER:-office_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-office_admin} -d ${POSTGRES_DB:-office_manager}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-office_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-office_manager}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@officemanager.local}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4000}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@officemanager.local}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:?DEFAULT_ADMIN_PASSWORD is required}
      SUPER_ADMIN_EMAILS: ${SUPER_ADMIN_EMAILS:-}
      ADMIN_FRONTEND_URL: ${ADMIN_FRONTEND_URL:-http://localhost:4001}
    volumes:
      - uploads:/app/uploads
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-4000}:80"
    networks:
      - internal

  admin-frontend:
    build:
      context: ./admin-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${ADMIN_PORT:-4001}:80"
    networks:
      - internal

  landing:
    build: ./landing
    restart: unless-stopped
    ports:
      - "${LANDING_PORT:-4002}:80"
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  uploads:
